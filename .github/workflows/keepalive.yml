name: keep-alive

# Pings the Render /health endpoint every 5 minutes so the free web service never sleeps
# (Render free tier sleeps after ~15 min of no inbound requests, which stops the in-process
# scanner/resolver/retrain schedulers). Keeping it awake makes the app genuinely 24/7.
#
# FREE only on a PUBLIC repo (GitHub Actions is unlimited for public repos). On a PRIVATE repo
# this consumes your 2,000 free Actions minutes/month and will stop mid-month — in that case use
# an external pinger (cron-job.org / UptimeRobot) instead and delete this workflow.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render /health (with wake retries)
        run: |
          URL="https://starkxquantedge.onrender.com/health"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "::warning::/health not 200 after retries (service may still be waking)"
